name: ci

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --configuration Release --no-restore

      - name: Test
        # On repasse sur un test standard pour éviter les erreurs de logger
        # Les résultats détaillés s'afficheront dans la console de l'Action
        run: dotnet test --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage"
